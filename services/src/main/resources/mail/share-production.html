<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;background:#141414;color:#ffffff;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px;background:#141414;">
    <tr>
        <td align="center">
            <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="max-width:640px;width:100%;background:#1d1d1d;border:1px solid rgba(255,255,255,0.12);border-radius:20px;overflow:hidden;">
                <tr><td style="padding:24px 28px;background:#000000;"><div style="color:#7c3aed;font-size:24px;font-weight:700;">Platea</div></td></tr>
                <tr>
                    <td style="padding:28px;">
                        <p style="margin:0 0 12px;color:#f5a623;text-transform:uppercase;letter-spacing:0.12em;font-size:12px;" th:text="#{mail.share.kicker}">Obra compartida</p>
                        <h1 style="margin:0 0 16px;font-size:28px;" th:text="#{mail.share.title(${senderName}, ${obraTitle})}">Te compartieron una obra</h1>
                        <p style="margin:0 0 12px;color:rgba(255,255,255,0.82);" th:text="#{mail.share.body}">Texto</p>
                        <p style="margin:0 0 12px;color:#ffffff;font-weight:700;" th:text="${productionName}">Production</p>
                        <p style="margin:0 0 24px;color:rgba(255,255,255,0.82);" th:text="#{mail.share.synopsis(${synopsis})}">Sinopsis</p>
                        <a th:href="${ctaUrl}" style="display:inline-block;padding:12px 18px;border-radius:999px;background:#7c3aed;color:#ffffff;text-decoration:none;font-weight:700;" th:text="${ctaLabel}">Ver publicacion</a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
